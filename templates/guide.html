<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ T.guide_title }} — {{ T.app_name }}</title>
  <link rel="icon" type="image/png" href="/imgs/favicon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=14">
  <style>
    .guide-wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
    .guide-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .guide-head img { height: 44px; width: auto; }
    .guide-content h1 { font-size: 26px; margin: 8px 0 16px; }
    .guide-content h2 { font-size: 19px; margin: 32px 0 10px; color: var(--accent-light); }
    .guide-content h3 { font-size: 16px; margin: 22px 0 8px; }
    .guide-content p, .guide-content li { line-height: 1.7; color: var(--muted); }
    .guide-content strong { color: var(--text); }
    .guide-content a { color: var(--accent-light); }
    .guide-content code {
      background: var(--card); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 4px; font-size: 13px; color: var(--text);
    }
    .guide-content table {
      width: 100%; border-collapse: collapse; margin: 12px 0;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .guide-content th, .guide-content td {
      text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--muted);
    }
    .guide-content th { color: var(--muted-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .guide-content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .guide-content blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 4px 14px; }
  </style>
</head>
<body>
<div class="guide-wrap">
  <div class="guide-head">
    <a href="/"><img src="/imgs/logo.png" alt="{{ T.app_name }}"></a>
  </div>
  <div class="guide-content">
    {{ guide_html|safe }}
  </div>
</div>
</body>
</html>
